name: Robot Deployment Check CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- STEP 1: PREPARE DOCKER BUILD ENGINE ---
    # Buildx is required to handle advanced caching features in GitHub Actions
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # --- STEP 2: CACHING LAYERS ---
    # This persists the Docker layers between runs. 
    # If requirements.txt hasn't changed, it skips the 'pip install' step.
    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    # --- STEP 3: ORCHESTRATION & VERIFICATION ---
    - name: Build and Test with Docker Compose
      run: |
        # Run command to launch system containers
        docker compose up -d --build

        # Run the tests specified in pytest
        docker compose exec -T backend python -m pytest

        # Cleanup: Stops containers and removes internal networks 
        docker compose down
