services:
  # Robot Simulator
  robot-sim:
    image: ghcr.io/francescodelduchetto/cmp9134_2526_robotsim:latest
    ports:
      - "5000:5000"
    restart: always

  # 2. FastAPI Backend Web Server
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ROBOT_API_URL=http://robot-sim:5000
      - JWT_SECRET=your_super_secret_key_here
    volumes:
      - ./backend:/app
      - robot_db_data:/data
    depends_on:
      - robot-sim
    restart: always

  # 3. Frontend Web App
  frontend:
    build: ./frontend
    ports:
      - "5173:80" # Mapping host 5173 to container Nginx port 80
    depends_on:
      - backend
    restart: always

networks:
  default:
    name: robot-network

volumes:
  robot_db_data: